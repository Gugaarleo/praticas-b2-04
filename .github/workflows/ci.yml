name: CI DevOps

on:
  push:
    branches: [ "main", "master" ]

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar flask e coverage
        run: pip install flask coverage

      - name: Rodar testes
        run: python -m coverage run -m unittest -v tests/appTest.py

      - name: Exibir relatório
        run: python -m coverage report

  test-job2:
    runs-on: ubuntu-latest
    steps:
      - name: Teste 2
        run: echo "This job tests something 2"

semgrep-sast:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Executar Semgrep SAST
      # Utiliza a imagem oficial do Semgrep para escanear o código
      run: |
        docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --json --output=gl-sast-report.json

    - name: Upload do Relatório SAST
      uses: actions/upload-artifact@v4
      with:
        name: sast-report
        path: gl-sast-report.json
      if: always() # Garante que o relatório seja salvo mesmo se encontrar falhas

  check-sast-report:
    runs-on: ubuntu-latest
    needs: semgrep-sast
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Baixar Relatório SAST
        uses: actions/download-artifact@v4
        with:
          name: sast-report

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validar o relatório SAST
        run: |
          python -c "
          import json
          import sys
          
          try:
              with open('gl-sast-report.json') as f:
                  report = json.load(f)
          except FileNotFoundError:
              print('Erro: Relatório não encontrado.')
              sys.exit(1)
          
          vulnerabilities = report.get('results', []) # Semgrep direto usa 'results' em vez de 'vulnerabilities'
          
          if vulnerabilities:
              print(f'\n== Relatório de Vulnerabilidades ({len(vulnerabilities)} encontradas) ==')
              for vuln in vulnerabilities:
                  name = vuln.get('check_id', 'Sem nome')
                  description = vuln.get('extra', {}).get('message', 'Sem descrição').replace('\n', ' ')
                  file = vuln.get('path', 'Arquivo não especificado')
                  start_line = vuln.get('start', {}).get('line', 'Início desconhecido')
                  
                  print(f'\n- Regra: {name}')
                  print(f'  Arquivo: {file} (Linha {start_line})')
                  print(f'  Descrição: {description}')
              
              sys.exit(1)
          else:
              print('Nenhuma vulnerabilidade encontrada.')
          "

  build-job:
    runs-on: ubuntu-latest
    steps:
      - name: Executar o build
        run: echo "Olá, ${{ github.actor }}!"

  deploy-prod-job:
    runs-on: ubuntu-latest
    needs: build-job
    environment: 
      name: production
    
    steps:
      - name: Executando o Deploy
        run: |
          echo "Implantando a branch ${{ github.ref_name }} em produção..."
          sleep 20
          echo "Implantação concluída com sucesso!"